<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A&R</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ff4e78,#ff8a9e);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  overflow:hidden;
}

.box{
  background:rgba(0,0,0,0.35);
  padding:35px;
  border-radius:20px;
  width:340px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:white;
  color:#ff4e78;
  font-size:16px;
  margin:10px;
  cursor:pointer;
}

input{
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

img{
  width:180px;
  border-radius:15px;
  margin:8px;
}

.heart{
  position:absolute;
  color:white;
  animation:fall 5s linear infinite;
}

@keyframes fall{
  0%{transform:translateY(-100px)}
  100%{transform:translateY(100vh)}
}

</style>
</head>

<body>

<div class="box" id="login">
  <h2>حطي تاريخنا يانورعيني 💕</h2>
  <input type="password" id="pass"><br>
  <button onclick="check()">دخول</button>
</div>

<div class="box" id="message" style="display:none;">
  <h2 id="text"></h2>
  <button onclick="next()">الي بعدو يانورعيني 💋</button>
</div>

<div class="box" id="gallery" style="display:none;">
  <h2>❤❤</h2>

  <p id="days"></p>

  <img src="
photo.jpg
">

  <br><br>

  <audio controls autoplay>
    <source src="song.mpeg" type="audio/mpeg">
  </audio>

  <br><br>

  <h3> تحبيني 👉🏻👈🏻</h3>

  <button onclick="yes()">اكيد</button>
  <button id="no">نو</button>

</div>

<script>

function check(){
  var p=document.getElementById("pass").value;

  if(p=="1082025"){
    document.getElementById("login").style.display="none";
    document.getElementById("message").style.display="block";
    typeText();
  }else{
    alert("ازاي بتتلخبطي ف تاريخنا 😳");
  }
}

function typeText(){

  var text="عايز اقولك ان انا بحبك وبموت فيكي وبعشقك اوييييي ربنا يخليكي ليا يروح قلبي وكل عيد واحنا مع بعض يانورعيني وبحبك بحبك بحبك يبطتي 💋 💋 ";
  var i=0;

  function typing(){
    if(i<text.length){
      document.getElementById("text").innerHTML+=text.charAt(i);
      i++;
      setTimeout(typing,50);
    }
  }

  typing();
}

function next(){
  document.getElementById("message").style.display="none";
  document.getElementById("gallery").style.display="block";
}

function yes(){
  alert("ده كده كده اصلاا");
}

document.getElementById("no").onmouseover=function(){

  this.style.position="absolute";
  this.style.left=Math.random()*300+"px";
  this.style.top=Math.random()*300+"px";

}

// تعديل التاريخ بطريقة صحيحة
var startDate = new Date(2025, 8, 10); // 8= اغسطس
var today=new Date();
var diff=Math.floor((today-startDate)/(1000*60*60*24));
document.getElementById("days").innerHTML="بقالنا مع بعض "+diff+" يوم ❤️";

function hearts(){

  var heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="💋";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(Math.random()*20+20)+"px";
  document.body.appendChild(heart);
  setTimeout(()=>{heart.remove()},5000);

}

setInterval(hearts,300);

</script>

</body>
</html>
